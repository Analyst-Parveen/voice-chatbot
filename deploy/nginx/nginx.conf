# Reverse proxy: single edge on :80 → frontend + backend.
# Routes /api and /ws to the backend (with WebSocket upgrade), everything else
# to the Next.js frontend. Put TLS termination in front of this in production
# (e.g. another nginx, a load balancer, or Caddy) and use wss:// origins.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # Map for WebSocket connection upgrade.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 25m;   # allow audio uploads

        # REST API + OpenAPI docs.
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /docs        { proxy_pass http://backend; }
        location /openapi.json { proxy_pass http://backend; }

        # WebSockets (chat + voice).
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;   # keep long-lived sockets alive
            proxy_send_timeout 3600s;
        }

        # Everything else → frontend.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
