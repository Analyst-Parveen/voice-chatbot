# =====================================================================
# GPU override — layer on top of docker-compose.yml on a GPU host.
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#
# Requires the NVIDIA Container Toolkit on the host. Gives Ollama (and the
# backend, for Whisper/bge) access to the GPU for much lower latency.
# =====================================================================

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    environment:
      # Tell the app to use CUDA where supported (Whisper/bge).
      WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
