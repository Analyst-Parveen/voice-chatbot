name: Deploy to AWS EC2

# Push to main → SSH into the EC2 host and rebuild/restart the Docker stack.
# The stack self-provisions Qdrant, Redis, Ollama (+ model pull), and downloads
# the Whisper/Piper/embedding models, so this workflow only needs SSH access.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST         public DNS or IP of the instance
#   EC2_USER         ssh user (e.g. ubuntu)
#   EC2_SSH_KEY      the PRIVATE key (PEM) matching the instance key pair
#   APP_DIR          optional; defaults to /opt/voice-agent

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Until the server exists, the deploy secrets are unset. Skip cleanly
      # (green check) instead of failing, and auto-activate once they're added.
      - name: Check deploy config
        id: check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped — set EC2_HOST/EC2_USER/EC2_SSH_KEY secrets to enable auto-deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            export APP_DIR="${{ secrets.APP_DIR }}"
            export APP_DIR="${APP_DIR:-/opt/voice-agent}"
            cd "$APP_DIR"
            bash deploy/aws/deploy.sh
